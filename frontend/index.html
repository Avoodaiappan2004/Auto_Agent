<!DOCTYPE html>
<html>
<head>
    <title>AutoDev Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glass">
    <h1>🤖 AutoDev Agent</h1>

    <input id="taskInput" placeholder="Enter your task..." />
    <button type="button" onclick="runAgent()">Run Agent 🚀</button>

    <div class="result">
        <p>Status: <span id="status">Idle</span></p>
        <p id="githubLink"></p>
    </div>

    <h3>Logs</h3>
    <pre id="logs"></pre>
</div>

<script src="script.js"></script>

</body>
</html>
